name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # Windows is the primary modpack-dev platform; Linux is the CI baseline.
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r run build

      - name: Test all packages
        run: pnpm -r run test

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Type-aware rules resolve cross-package imports through each package's
      # built dist (.d.ts), and the flat config itself imports the built
      # @mctools/eslint-plugin-zs + @mctools/format — so build everything first.
      - name: Build all packages
        run: pnpm -r run build

      - name: Lint
        run: pnpm run lint

  # NOTE: a "README freshness" gate was intentionally dropped. `pnpm build:readme`
  # runs each CLI's `--help` and embeds the rendered output — including
  # OS-specific config paths (e.g. `packages\errors\src\config.yml` on Windows
  # vs `/`-separated on Linux). READMEs generated on the Windows dev machine can
  # never byte-match ones regenerated on Linux CI, so a `git diff` gate is red by
  # construction. Regenerate READMEs locally before a release instead.
