name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

# One release at a time; never cancel an in-flight publish.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # create git tags + GitHub releases
  issues: write # semantic-release comments on released issues
  pull-requests: write

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    # Gate the publish on a green build/test/lint of the same commit.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history + tags
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r run build

      - name: Test all packages
        run: pnpm -r run test

      # Publishes only non-private packages (utils + extension are filtered out
      # in the release:all script). workspace:* deps are replaced with real
      # versions by pnpm at pack time; bundled-only utils is already inlined.
      - name: Release
        run: pnpm run release:all
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
